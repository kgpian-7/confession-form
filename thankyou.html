<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:#ff4ecd;
    border-radius:50%;
    top:-100px;
    left:-100px;
    filter:blur(120px);
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#00f2fe;
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(120px);
}

.card{
    width:420px;
    text-align:center;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 10px 35px rgba(0,0,0,0.3);
    color:white;
    animation:fadeIn 1s ease;
}

.check{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    margin-bottom:20px;
    animation:pop 0.8s ease;
}

h1{
    font-size:36px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    opacity:0.9;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    background:linear-gradient(45deg,#ff4ecd,#7f5cff);
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pop{
    0%{
        transform:scale(0);
    }
    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div class="card">

    <div class="check">✓</div>

    <h1>Thank You!</h1>

    <p>
        Your confession has been submitted successfully.
        Thank you for sharing your thoughts.
    </p>

    <a href="index.html" class="btn">
        Submit Another
    </a>

</div>

</body>
</html>
